name: Release

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: Changelog for this release
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read release metadata
        id: meta
        run: |
          version=$(jq -r '.version' src/manifest.json)
          package=$(jq -r '.package' src/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "file=v$version-$package.ankiaddon" >> "$GITHUB_OUTPUT"

      - name: Build addon package
        run: |
          chmod +x ./release.sh
          ./release.sh
          test -f "${{ steps.meta.outputs.file }}"

      - name: Check tag does not exist
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Error: tag '$TAG' already exists. Bump src/manifest.json version (or delete the tag) and re-run." >&2
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: ${{ inputs.changelog }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.file }}
